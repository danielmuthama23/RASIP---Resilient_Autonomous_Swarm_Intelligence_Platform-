version: '3.9'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./.env.example
    depends_on:
      - qdrant

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./.env.example
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
