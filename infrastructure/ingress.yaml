# ── NGINX Ingress Controller ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rasip-ingress
  namespace: rasip
  annotations:
    # NGINX ingress class
    kubernetes.io/ingress.class: "nginx"

    # TLS: cert-manager will provision Let's Encrypt cert
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # WebSocket support for /telemetry endpoint
    nginx.ingress.kubernetes.io/proxy-read-timeout:   "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout:   "3600"
    nginx.ingress.kubernetes.io/proxy-http-version:   "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";

    # Rate limiting: 100 req/min per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"

    # Gzip compression for static assets
    nginx.ingress.kubernetes.io/enable-gzip: "true"

    # CORS — allow frontend origin
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://rasip.example.com"
    nginx.ingress.kubernetes.io/enable-cors:         "true"

    # Security headers
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Frame-Options "DENY";
      add_header X-Content-Type-Options "nosniff";
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

spec:
  tls:
    - hosts:
        - rasip.example.com
        - api.rasip.example.com
      secretName: rasip-tls

  rules:
    # ── Frontend ─────────────────────────────────────────
    - host: rasip.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80

    # ── Backend API + WebSocket ───────────────────────────
    - host: api.rasip.example.com
      http:
        paths:
          # WebSocket telemetry stream
          - path: /telemetry
            pathType: Exact
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          # REST API catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000

---
# ── cert-manager ClusterIssuer (Let's Encrypt) ───────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email:  ops@rasip.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
